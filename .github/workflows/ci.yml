# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-html
          path: coverage/
          retention-days: 14
      - name: Verify snapshot baselines present and non-empty
        if: always()
        run: |
          test -s tests/__snapshots__/views/dashboard.html
          test -s tests/__snapshots__/views/diagnostic.html
          test -s tests/__snapshots__/views/report.html

  audit:
    name: Security Audit
    needs: setup
    runs-on: ubuntu-latest
    steps:
      # gitleaks-action needs full history to compute its incremental scan range;
      # default shallow clone (depth=1) made it fail with "unknown revision".
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Hard fail: npm audit on production deps (D-21)
      - name: npm audit (prod deps, high severity)
        run: npm audit --audit-level=high --omit=dev
      # Hard fail: npm audit on functions/ prod deps (D-21 pattern extended Phase 3 to functions/ workspace)
      # functions/ is intentionally NOT a root workspace member (Pitfall 2) so root npm ci does not install its deps.
      - name: npm audit (functions/ prod deps, high severity)
        run: |
          cd functions
          npm ci
          npm audit --audit-level=high --omit=dev
      # Soft fail: OSV-Scanner (D-20)
      - name: OSV-Scanner
        id: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format=table
            .
      # CI gitleaks scan - backstop for devs who skip local pre-commit hook.
      # GITHUB_TOKEN is required for pull_request events (gitleaks-action v2.3.x
      # breaking change — push events work without it but PR events fail).
      - name: gitleaks detect
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  build:
    name: Build
    needs: [lint, typecheck, test, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Firebase Hosting
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Install + build functions/ workspace
        run: |
          cd functions
          npm ci
          npm run build
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Deploy hosting + functions
        run: |
          npx firebase-tools@15.16.0 deploy \
            --only hosting,functions \
            --project bedeveloped-base-layers \
            --non-interactive
      - name: Assert security headers (T-3-1 mitigation)
        run: |
          set -euo pipefail
          HEADERS=$(curl -s -I https://baselayers.bedeveloped.com)
          echo "$HEADERS"
          echo "$HEADERS" | grep -i "^strict-transport-security:"        || (echo "MISSING: HSTS"                  && exit 1)
          echo "$HEADERS" | grep -i "^x-content-type-options:"           || (echo "MISSING: X-CTO"                 && exit 1)
          echo "$HEADERS" | grep -i "^referrer-policy:"                  || (echo "MISSING: Referrer-Policy"       && exit 1)
          echo "$HEADERS" | grep -i "^permissions-policy:"               || (echo "MISSING: Permissions-Policy"    && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-opener-policy:"       || (echo "MISSING: COOP"                  && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-embedder-policy:"     || (echo "MISSING: COEP"                  && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-resource-policy:"     || (echo "MISSING: CORP"                  && exit 1)
          echo "$HEADERS" | grep -i "^reporting-endpoints:"              || (echo "MISSING: Reporting-Endpoints"   && exit 1)
          echo "$HEADERS" | grep -i "^content-security-policy-report-only:" || (echo "MISSING: CSP-RO"             && exit 1)
          echo "All 9 expected headers present."

  preview:
    name: Deploy PR Preview Channel
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Install + build functions/ workspace
        run: |
          cd functions
          npm ci
          npm run build
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          projectId: bedeveloped-base-layers
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
