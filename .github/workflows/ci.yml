# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-html
          path: coverage/
          retention-days: 14
      - name: Verify snapshot baselines present and non-empty
        if: always()
        run: |
          test -s tests/__snapshots__/views/dashboard.html
          test -s tests/__snapshots__/views/diagnostic.html
          test -s tests/__snapshots__/views/report.html

  test-rules:
    name: Rules Tests (Emulator)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Java (firebase-tools 15.x requires JDK 21+)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Run rules tests via emulators:exec
        run: npm run test:rules

  audit:
    name: Security Audit
    needs: setup
    runs-on: ubuntu-latest
    steps:
      # gitleaks-action needs full history to compute its incremental scan range;
      # default shallow clone (depth=1) made it fail with "unknown revision".
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Hard fail: npm audit on production deps (D-21)
      - name: npm audit (prod deps, high severity)
        run: npm audit --audit-level=high --omit=dev
      # Hard fail: npm audit on functions/ prod deps (D-21 pattern extended Phase 3 to functions/ workspace)
      # functions/ is intentionally NOT a root workspace member (Pitfall 2) so root npm ci does not install its deps.
      - name: npm audit (functions/ prod deps, high severity)
        run: |
          cd functions
          npm ci
          npm audit --audit-level=high --omit=dev
      # Soft fail: OSV-Scanner (D-20)
      - name: OSV-Scanner
        id: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format=table
            .
      # CI gitleaks scan - backstop for devs who skip local pre-commit hook.
      # GITHUB_TOKEN is required for pull_request events (gitleaks-action v2.3.x
      # breaking change — push events work without it but PR events fail).
      - name: gitleaks detect
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  build:
    name: Build
    needs: [lint, typecheck, test, test-rules, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build (with reCAPTCHA Enterprise key — secret if set, placeholder otherwise)
        # Phase 7 Wave 3 (FN-07): vite.config.js fail-closed guard requires
        # VITE_RECAPTCHA_ENTERPRISE_SITE_KEY for production builds. PR-validation
        # builds use a placeholder so the bundle structure is verified without
        # leaking a real key into preview channels. The deploy job below sets
        # the real key from secrets.
        #
        # Phase 9 Wave 2 (OBS-04): VITE_SENTRY_DSN + VITE_GIT_SHA + SENTRY_AUTH_TOKEN
        # + GITHUB_SHA wired in. SENTRY_AUTH_TOKEN is empty for PR builds (forks
        # do not get repo secrets); the @sentry/vite-plugin condition in
        # vite.config.js is a silent no-op without it. Source-map upload only
        # fires from the deploy + preview jobs below where the secret resolves.
        env:
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY || 'ci-build-verification-placeholder' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Firebase Hosting
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build (with reCAPTCHA Enterprise key from secrets + Sentry source-map upload)
        # Phase 9 Wave 2 (OBS-04): SENTRY_AUTH_TOKEN populated from secrets so
        # the @sentry/vite-plugin uploads source maps to the EU Sentry instance
        # and deletes dist/**/*.map post-upload (filesToDeleteAfterUpload). The
        # gate step below asserts the cleanup ran (Pitfall 6 — hidden source
        # maps invariant; deploy fails closed if any .map remains).
        env:
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY || 'ci-build-verification-placeholder' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run build
      - name: Assert no .map files served from dist (OBS-04 / Pitfall 6)
        # Hidden-source-map invariant. The @sentry/vite-plugin
        # filesToDeleteAfterUpload pattern should have deleted every .map after
        # uploading to Sentry. If any survive, hosting would serve them and
        # leak original source. Two failure modes both surface here:
        #   1. plugin filesToDeleteAfterUpload misconfigured (vite.config.js drift)
        #   2. SENTRY_AUTH_TOKEN missing/empty so plugin did not run at all
        # Both are deploy-blocking. Token redaction: the gate never echoes the
        # secret; GitHub Actions auto-masks any echoed value anyway.
        run: |
          set -euo pipefail
          if find dist -name "*.map" -type f | grep -q .; then
            echo "FAIL: dist/*.map files present after build."
            echo "Cause: @sentry/vite-plugin filesToDeleteAfterUpload misconfigured,"
            echo "       OR SENTRY_AUTH_TOKEN missing so plugin did not run."
            find dist -name "*.map" -type f
            exit 1
          fi
          echo "OK: no .map files in dist (hidden source-map invariant satisfied)"
      - name: Install + build functions/ workspace
        run: |
          cd functions
          npm ci
          npm run build
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Deploy hosting + rules (functions excluded — D-8/D-9 substrate gap)
        # Phase 6 Wave 5 cutover-recovery (2026-05-09 post-merge): functions
        # dropped from --only because firebase-tools' functions deploy attempts
        # to set roles/run.invoker on the Cloud Run services with `allUsers`,
        # which org policy iam.allowedPolicyMemberDomains blocks (D-8). Each
        # failed IAM-set step also wipes the manually-bound
        # gcp-sa-identitytoolkit invoker (D-7), which breaks the blocking
        # handlers end-to-end. Until D-8 ToS gate is resolved (Phase 7
        # cleanup-ledger row), functions stay manual:
        #     firebase deploy --only functions --project bedeveloped-base-layers
        # operator-run from local; D-7 invoker rebind procedure documented in
        # runbooks/phase-6-cleanup-ledger.md.
        #
        # Hosting + firestore/storage rules deploy cleanly via WIF + the
        # github-actions-deployer SA (roles/firebase.admin grants the
        # firebasestorage.defaultBucket.get perm needed for the storage rules
        # path). cloudbilling.googleapis.com enabled on the project as part of
        # the WIF setup.
        #
        # D-12 rollback substrate is partial: rules + hosting auto-roll on
        # `git revert <sha> + git push` via this job; functions need the
        # operator's manual local deploy too. Update D-12 evidence in the
        # cutover log to reflect this honestly.
        run: |
          npx firebase-tools@15.16.0 deploy \
            --only hosting,firestore,storage \
            --project bedeveloped-base-layers \
            --non-interactive
      - name: Assert security headers (T-3-1 mitigation) on Firebase Hosting
        # Targets bedeveloped-base-layers.web.app (Firebase Hosting). The
        # custom domain baselayers.bedeveloped.com CNAMEs to GitHub Pages
        # which serves the repo-root files (no custom-headers support);
        # GitHub Pages is auto-deployed by github/pages source = main on
        # every push and is independent of this firebase deploy. T-3-1
        # mitigation is verified at the Firebase Hosting layer because
        # that's where the headers from firebase.json land. The GitHub
        # Pages production-domain story is a Phase 6 Wave 5 deviation
        # captured in 06-PREFLIGHT.md ## Cutover Log and queued for Wave 6
        # cleanup-ledger (DNS migration to Firebase Hosting OR security
        # plan revision to acknowledge GitHub Pages).
        run: |
          set -euo pipefail
          HEADERS=$(curl -s -I https://bedeveloped-base-layers.web.app)
          echo "$HEADERS"
          echo "$HEADERS" | grep -i "^strict-transport-security:"        || (echo "MISSING: HSTS"                  && exit 1)
          echo "$HEADERS" | grep -i "^x-content-type-options:"           || (echo "MISSING: X-CTO"                 && exit 1)
          echo "$HEADERS" | grep -i "^referrer-policy:"                  || (echo "MISSING: Referrer-Policy"       && exit 1)
          echo "$HEADERS" | grep -i "^permissions-policy:"               || (echo "MISSING: Permissions-Policy"    && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-opener-policy:"       || (echo "MISSING: COOP"                  && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-embedder-policy:"     || (echo "MISSING: COEP"                  && exit 1)
          echo "$HEADERS" | grep -i "^cross-origin-resource-policy:"     || (echo "MISSING: CORP"                  && exit 1)
          echo "$HEADERS" | grep -i "^reporting-endpoints:"              || (echo "MISSING: Reporting-Endpoints"   && exit 1)
          echo "$HEADERS" | grep -i "^content-security-policy-report-only:" || (echo "MISSING: CSP-RO"             && exit 1)
          echo "All 9 expected headers present on bedeveloped-base-layers.web.app."

  preview:
    name: Deploy PR Preview Channel
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build (preview channel — placeholder reCAPTCHA key + Sentry source-map upload)
        # Phase 9 Wave 2 (OBS-04): preview channel deploys also upload source
        # maps so PR preview-channel error stacks resolve. Same env shape as
        # the main deploy. If SENTRY_AUTH_TOKEN is unavailable on a fork PR,
        # the plugin no-ops AND the gate below catches the leftover .map files
        # — preview fails closed, mirroring deploy semantics.
        env:
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY || 'ci-build-verification-placeholder' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run build
      - name: Assert no .map files served from dist (OBS-04 / Pitfall 6)
        # Same hidden-source-map invariant as the deploy job. Preview channels
        # are publicly reachable URLs — leaking .map files there is the same
        # information-disclosure risk as a production deploy.
        run: |
          set -euo pipefail
          if find dist -name "*.map" -type f | grep -q .; then
            echo "FAIL: dist/*.map files present after build."
            echo "Cause: @sentry/vite-plugin filesToDeleteAfterUpload misconfigured,"
            echo "       OR SENTRY_AUTH_TOKEN missing so plugin did not run."
            find dist -name "*.map" -type f
            exit 1
          fi
          echo "OK: no .map files in dist (hidden source-map invariant satisfied)"
      - name: Install + build functions/ workspace
        run: |
          cd functions
          npm ci
          npm run build
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      # Phase 6 Wave 5 (cutover-CI-fix): action-hosting-deploy@v0.10.0 requires a
      # `firebaseServiceAccount` JSON key input and does not natively consume WIF
      # credentials. Use raw firebase-tools instead — same mechanism as the main
      # Deploy to Firebase Hosting job, proven WIF-compatible because google-
      # github-actions/auth has already populated GOOGLE_APPLICATION_CREDENTIALS.
      - name: Deploy to PR preview channel
        run: |
          npx firebase-tools@15.16.0 hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project bedeveloped-base-layers \
            --expires 7d \
            --non-interactive
