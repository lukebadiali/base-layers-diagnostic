# .gitleaks.toml
title = "Base Layers Diagnostic — gitleaks config"

[extend]
# Extend the default gitleaks ruleset (covers AWS keys, GitHub tokens, generic API patterns, etc.)
useDefault = true

# Phase 6 Wave 5 (AUTH-14 / D-04): the custom `sha256-hex-literal-regression`
# rule was retired alongside the deletion of INTERNAL_PASSWORD_HASH from
# src/main.js — its target is gone; the cleanup-ledger row closes here.

[allowlist]
description = "Allow legitimate hex strings in test fixtures, runbooks, and project planning docs"
paths = [
  "tests/",
  "runbooks/",
  # GSD planning + research docs legitimately quote C2-shape hashes when documenting the
  # custom regression rule itself (PLAN.md, RESEARCH.md, VALIDATION.md, CONCERNS.md cite
  # the prior INTERNAL_PASSWORD_HASH value to anchor the rule's intent). Allowlisting the
  # whole .planning/ tree avoids future churn each time a phase document references a
  # secret-shape literal in a code block.
  ".planning/",
]
regexes = [
  # Vitest snapshot hex is fine (e.g., expect(hash).toBe("...") in regression tests)
  '''expect\([^)]+\)\.toBe\(["\'][a-f0-9]{64}["\']''',
  # Firebase web SDK apiKey — public per Firebase docs (project identifier, not a secret;
  # security is enforced by Firestore Rules in Phase 5). Pattern matches AIzaSy + 33 chars
  # of [A-Za-z0-9_-] which is the documented Firebase web apiKey shape. gitleaks applies
  # allowlist regexes against the matched Secret; the trailing optional quote keeps the
  # match tolerant of how the gcp-api-key rule captures the trailing context character.
  '''AIzaSy[A-Za-z0-9_-]{33}["\']?''',
]

# Phase 9 Wave 5 (OBS-05 / Pitfall 4 / 09-RESEARCH.md §848-853):
# Block Slack incoming-webhook URLs from being committed. The trigger
# (functions/src/observability/authAnomalyAlert.ts) consumes
# SLACK_WEBHOOK_URL via defineSecret(); the secret lives in GCP Secret
# Manager only and MUST NOT enter the repo via runbooks, scripts, .env
# files, or anywhere else. Defence-in-depth alongside the Wave 6
# operator-runbook discipline.
#
# Pattern matches the documented Slack incoming-webhook URL shape:
# https://hooks.slack.com/services/T<10-26 alphanum>/B<10-26 alphanum>/<24+ alphanum>
# Markdown placeholders like T.../B.../... (which contain dots/ellipses)
# do NOT match, so docs that reference the URL format are not false-positive.
[[rules]]
id = "slack-webhook-url"
description = "Phase 9 Pitfall 4 — Slack incoming webhook URL committed"
regex = '''https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'''
tags = ["secret", "slack", "phase-9"]
