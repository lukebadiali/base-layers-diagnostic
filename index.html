<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeDeveloped - The Base Layers</title>
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css?v=55" />
    <!-- Phase 4 Wave 1 (D-08): self-hosted fonts (assets/fonts/, OFL); Chart.js bundled via npm (loaded transitively by src/main.js). -->
  </head>
  <body>
    <!-- App shell: gets mounted by src/main.js depending on session state.
         Seeded with the splash so there is zero white flash before main.js
         runs. main.js's first render() replaces this: it holds the splash
         until Firebase Auth resolves the persisted session (authResolved),
         then paints the app or the sign-in screen. Keep in sync with
         renderSplash() in src/main.js and .auth-splash in styles.css. -->
    <div id="app">
      <div class="auth-splash" role="status" aria-label="Loading">
        <img class="auth-splash-logo" src="assets/logo.png?v=54" alt="BeDeveloped" />
      </div>
    </div>

    <!-- Modal host -->
    <div id="modalRoot" class="modal-root hidden" role="dialog" aria-modal="true"></div>

    <!-- Phase 4 Wave 5 (D-03): app.js died; src/main.js is the single bootstrap.
         The Wave 1 bridge tags for src/firebase/{app,auth,db,storage}.js were
         removed — main.js imports them transitively as side-effect imports
         at module top so initializeApp + initAppCheck still run before any
         data/* or views/* code (D-06 critical ordering preserved). -->
    <script src="data/pillars.js?v=55"></script>
    <script type="module" src="./src/main.js?v=55"></script>
  </body>
</html>
